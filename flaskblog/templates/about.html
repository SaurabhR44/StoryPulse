{% extends "layout.html" %}
{% block content %}
<div class="content-section" style="text-align:center; padding: 3rem 2rem;">
    <h1
        style="font-size:2.4rem;font-weight:800;background:linear-gradient(135deg,var(--accent-light),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1rem;">
        About StoryPulse
    </h1>
    <p style="color:var(--text-secondary);max-width:520px;margin:0 auto 1.5rem;font-size:1rem;line-height:1.8;">
        A clean, modern blogging platform built with Flask. Create an account to share your thoughts with the world,
        explore posts from other authors, and manage your own content.
    </p>
    <a href="{{ url_for('users.register') }}" class="btn btn-primary" style="font-size:0.95rem;padding:0.65rem 1.5rem;">
        Get Started →
    </a>
</div>
{% endblock content %}
